<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Xinn AI</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e1b4b, #020617 70%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 32px 24px;
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(129, 140, 248, 0.35);
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.25);
      text-align: center;
    }

    .logo {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.55);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      background: linear-gradient(90deg, #38bdf8, #c084fc);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 26px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(59, 130, 246, 0.45);
    }

    button:active {
      transform: scale(0.97);
    }

    .small {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <img class="logo" src="./avatar.gif" alt="Xinn AI" />

    <h1>Xinn AI</h1>
    <p>Login dulu untuk mulai menggunakan Xinn AI.</p>

    <button id="loginBtn">Login dengan Google</button>

    <div class="small">Akun kamu dipakai untuk menyimpan sesi dan limit penggunaan.</div>
  </div>

  <script type="module">
  import { loginGoogle, handleLoginResult } from "./auth.js";

  // WAJIB: cek hasil login setelah redirect
  handleLoginResult();

  const btn = document.getElementById("loginBtn");

  btn.addEventListener("click", async () => {
    await loginGoogle();
  });
</script>
</body>
</html>
